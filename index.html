<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ImpactInsoles • 12-bit + Packet Test</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Exo+2:wght@300;600;900&display=swap');

    :root {
      --orange: #FF6B35;
      --blue: #0066CC;
      --blue-light: #338FDB;
      --bg-dark: #0A0E1A;
      --bg-card: #141824;
      --text-white: #FFFFFF;
      --text-gray: #8A8FA8;
      --green: #00E5A0;
      --red: #FF3B30;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Exo 2', -apple-system, sans-serif;
      background: var(--bg-dark);
      color: var(--text-white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: 
        radial-gradient(circle at 20% 50%, rgba(255,107,53,0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 50%, rgba(0,102,204,0.15) 0%, transparent 50%);
      animation: rotate 30s linear infinite;
      pointer-events: none;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
      animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 6px;
      background: linear-gradient(135deg, var(--orange) 0%, var(--blue) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 11px;
      color: var(--text-gray);
      letter-spacing: 4px;
      text-transform: uppercase;
      font-weight: 300;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--bg-card);
      border: 2px solid transparent;
      border-radius: 24px;
      padding: 10px 20px;
      margin: 20px 0;
      transition: all 0.3s ease;
    }

    .status-badge.connected {
      border-color: var(--blue);
      box-shadow: 0 0 20px rgba(0,102,204,0.3);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text-gray);
      transition: all 0.3s ease;
    }

    .status-dot.connected {
      background: var(--blue);
      box-shadow: 0 0 12px var(--blue);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.2); }
    }

    .status-text {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .connect-btn {
      width: 100%;
      padding: 20px;
      background: linear-gradient(135deg, var(--orange) 0%, #E85A2A 100%);
      border: none;
      border-radius: 16px;
      color: white;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 24px rgba(255,107,53,0.4);
      font-family: 'Exo 2', sans-serif;
      text-transform: uppercase;
    }

    .connect-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(255,107,53,0.5);
    }

    .connect-btn:disabled {
      background: var(--bg-card);
      color: var(--text-gray);
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin: 32px 0;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.5s ease;
    }

    .stats-grid.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .stat-card {
      background: var(--bg-card);
      border: 2px solid var(--blue);
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(0,102,204,0.1) 0%, transparent 70%);
      animation: rotate 20s linear infinite;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-gray);
      letter-spacing: 3px;
      margin-bottom: 12px;
      position: relative;
      font-weight: 600;
    }

    .stat-value {
      font-size: 48px;
      font-weight: 900;
      font-family: 'Roboto Mono', monospace;
      background: linear-gradient(135deg, var(--blue-light) 0%, var(--blue) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      position: relative;
      transition: transform 0.2s ease;
    }

    .stat-value.updating {
      transform: scale(1.05);
    }

    .stat-unit {
      font-size: 12px;
      color: var(--text-gray);
      font-family: 'Roboto Mono', monospace;
      margin-top: 8px;
      position: relative;
    }

    /* Packet Loss Card */
    .loss-card {
      background: var(--bg-card);
      border: 2px solid var(--green);
      border-radius: 20px;
      padding: 24px;
      margin: 24px 0;
      opacity: 0;
      transform: scale(0.95);
      transition: all 0.5s ease;
    }

    .loss-card.visible {
      opacity: 1;
      transform: scale(1);
    }

    .loss-card.warning {
      border-color: var(--orange);
    }

    .loss-card.error {
      border-color: var(--red);
    }

    .loss-title {
      font-size: 14px;
      font-weight: 900;
      color: var(--text-white);
      letter-spacing: 3px;
      margin-bottom: 16px;
      text-align: center;
    }

    .loss-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 16px;
    }

    .loss-stat {
      text-align: center;
    }

    .loss-stat-label {
      font-size: 10px;
      color: var(--text-gray);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .loss-stat-value {
      font-size: 24px;
      font-weight: 900;
      font-family: 'Roboto Mono', monospace;
    }

    .loss-percent {
      font-size: 56px;
      font-weight: 900;
      text-align: center;
      margin: 16px 0;
      font-family: 'Roboto Mono', monospace;
    }

    .loss-percent.good { color: var(--green); }
    .loss-percent.warning { color: var(--orange); }
    .loss-percent.bad { color: var(--red); }

    /* Recording Controls */
    .recording-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 24px 0;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.5s ease;
    }

    .recording-controls.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .record-btn {
      padding: 18px;
      border: none;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Exo 2', sans-serif;
      text-transform: uppercase;
    }

    .start-btn {
      background: linear-gradient(135deg, var(--blue) 0%, #004C99 100%);
      color: white;
      box-shadow: 0 4px 16px rgba(0,102,204,0.3);
    }

    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,102,204,0.4);
    }

    .start-btn.recording {
      background: var(--bg-card);
      color: var(--text-gray);
      cursor: default;
    }

    .stop-btn {
      background: var(--bg-card);
      border: 2px solid var(--orange);
      color: var(--orange);
    }

    .stop-btn:hover:not(:disabled) {
      background: var(--orange);
      color: white;
    }

    .stop-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .recording-indicator {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 20px;
      background: rgba(255,107,53,0.15);
      border: 2px solid var(--orange);
      border-radius: 12px;
      margin: 16px 0;
    }

    .recording-indicator.active {
      display: flex;
    }

    .rec-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--orange);
      animation: blink 1s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .rec-text {
      font-size: 12px;
      font-weight: 700;
      color: var(--orange);
      letter-spacing: 2px;
    }

    .rec-time {
      font-family: 'Roboto Mono', monospace;
      font-size: 14px;
      color: var(--orange);
      font-weight: 700;
    }

    .graph-container {
      background: var(--bg-card);
      border: 2px solid var(--blue);
      border-radius: 20px;
      padding: 24px;
      margin: 24px 0;
      display: none;
    }

    .graph-container.visible {
      display: block;
      animation: fadeInUp 0.6s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .graph-title {
      font-size: 14px;
      font-weight: 900;
      color: var(--text-white);
      letter-spacing: 3px;
      margin-bottom: 20px;
      text-align: center;
    }

    canvas {
      max-width: 100%;
    }

    .session-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 16px;
    }

    .session-stat-card {
      background: rgba(0,102,204,0.1);
      border: 1px solid var(--blue);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }

    .session-stat-label {
      font-size: 9px;
      color: var(--text-gray);
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .session-stat-value {
      font-size: 20px;
      font-weight: 900;
      color: var(--blue-light);
      font-family: 'Roboto Mono', monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">IMPACT INSOLES</div>
      <div class="tagline">12-Bit Resolution • Packet Loss Testing</div>
    </div>

    <center>
      <div class="status-badge" id="statusBadge">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">Not Connected</span>
      </div>
    </center>

    <button class="connect-btn" id="connectBtn" onclick="toggleConnection()">
      🔵 Scan & Connect
    </button>

    <!-- Live Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="stat-label">SENSOR VALUE</div>
        <div class="stat-value" id="sensorValue">0</div>
        <div class="stat-unit">0 – 4095 (12-bit)</div>
      </div>
      
      <div class="stat-card">
        <div class="stat-label">PACKET COUNT</div>
        <div class="stat-value" id="packetCount">0</div>
        <div class="stat-unit">Total Received</div>
      </div>
    </div>

    <!-- Packet Loss Stats -->
    <div class="loss-card" id="lossCard">
      <div class="loss-title">PACKET LOSS TEST</div>
      <div class="loss-percent good" id="lossPercent">0.00%</div>
      <div class="loss-stats">
        <div class="loss-stat">
          <div class="loss-stat-label">RECEIVED</div>
          <div class="loss-stat-value" id="packetsReceived" style="color: var(--green)">0</div>
        </div>
        <div class="loss-stat">
          <div class="loss-stat-label">LOST</div>
          <div class="loss-stat-value" id="packetsLost" style="color: var(--red)">0</div>
        </div>
        <div class="loss-stat">
          <div class="loss-stat-label">EXPECTED</div>
          <div class="loss-stat-value" id="packetsExpected" style="color: var(--text-gray)">0</div>
        </div>
      </div>
    </div>

    <!-- Recording Controls -->
    <div class="recording-controls" id="recordingControls">
      <button class="record-btn start-btn" id="startBtn" onclick="startRecording()">
        ▶ Start Session
      </button>
      <button class="record-btn stop-btn" id="stopBtn" onclick="stopRecording()" disabled>
        ⏹ Stop Session
      </button>
    </div>

    <div class="recording-indicator" id="recordingIndicator">
      <div class="rec-dot"></div>
      <span class="rec-text">RECORDING</span>
      <span class="rec-time" id="recTime">00:00</span>
    </div>

    <!-- Graph -->
    <div class="graph-container" id="graphContainer">
      <div class="graph-title">SESSION GRAPH (12-BIT)</div>
      <canvas id="sessionChart"></canvas>
      
      <div class="session-stats">
        <div class="session-stat-card">
          <div class="session-stat-label">DURATION</div>
          <div class="session-stat-value" id="statDuration">0s</div>
        </div>
        <div class="session-stat-card">
          <div class="session-stat-label">AVG VALUE</div>
          <div class="session-stat-value" id="statAvg">0</div>
        </div>
        <div class="session-stat-card">
          <div class="session-stat-label">MAX VALUE</div>
          <div class="session-stat-value" id="statMax">0</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SERVICE_UUID = '12345678-1234-1234-1234-123456789abc';
    const CHARACTERISTIC_UUID = 'abcd1234-ab12-ab12-ab12-abcdef123456';

    let bluetoothDevice = null;
    let characteristic = null;
    let isRecording = false;
    let recordingData = [];
    let recordingStartTime = null;
    let timerInterval = null;
    let chart = null;

    // Packet loss tracking
    let lastPacketID = -1;
    let totalPacketsReceived = 0;
    let totalPacketsLost = 0;
    let currentPacketID = 0;

    // UI Elements
    const connectBtn = document.getElementById('connectBtn');
    const statusBadge = document.getElementById('statusBadge');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const statsGrid = document.getElementById('statsGrid');
    const sensorValue = document.getElementById('sensorValue');
    const packetCount = document.getElementById('packetCount');
    const lossCard = document.getElementById('lossCard');
    const lossPercent = document.getElementById('lossPercent');
    const packetsReceived = document.getElementById('packetsReceived');
    const packetsLost = document.getElementById('packetsLost');
    const packetsExpected = document.getElementById('packetsExpected');
    const recordingControls = document.getElementById('recordingControls');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const recordingIndicator = document.getElementById('recordingIndicator');
    const recTime = document.getElementById('recTime');
    const graphContainer = document.getElementById('graphContainer');

    async function toggleConnection() {
      if (bluetoothDevice && bluetoothDevice.gatt.connected) {
        disconnect();
      } else {
        await connect();
      }
    }

    async function connect() {
      try {
        connectBtn.disabled = true;
        connectBtn.textContent = '🔍 SCANNING...';

        bluetoothDevice = await navigator.bluetooth.requestDevice({
          filters: [{ name: 'ImpactInsoles' }],
          optionalServices: [SERVICE_UUID]
        });

        connectBtn.textContent = '🔗 CONNECTING...';

        const server = await bluetoothDevice.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

        await characteristic.startNotifications();
        characteristic.addEventListener('characteristicvaluechanged', handleData);

        statusBadge.classList.add('connected');
        statusDot.classList.add('connected');
        statusText.textContent = 'Connected';
        connectBtn.textContent = '🔴 DISCONNECT';
        connectBtn.disabled = false;
        
        statsGrid.classList.add('visible');
        lossCard.classList.add('visible');
        recordingControls.classList.add('visible');

        // Reset counters
        lastPacketID = -1;
        totalPacketsReceived = 0;
        totalPacketsLost = 0;

        console.log('✅ Connected to ImpactInsoles (12-bit mode)');
      } catch (error) {
        console.error('Connection failed:', error);
        alert('Connection failed: ' + error.message);
        connectBtn.textContent = '🔵 SCAN & CONNECT';
        connectBtn.disabled = false;
      }
    }

    function disconnect() {
      if (bluetoothDevice) {
        bluetoothDevice.gatt.disconnect();
        statusBadge.classList.remove('connected');
        statusDot.classList.remove('connected');
        statusText.textContent = 'Disconnected';
        connectBtn.textContent = '🔵 SCAN & CONNECT';
        
        statsGrid.classList.remove('visible');
        lossCard.classList.remove('visible');
        recordingControls.classList.remove('visible');
        
        if (isRecording) stopRecording();
        
        console.log('Disconnected');
      }
    }

    function handleData(event) {
      const data = new Uint8Array(event.target.value.buffer);
      
      // Decode 12-bit sensor value from bytes 0-1
      const sensor0 = (data[0] << 8) | data[1];  // 0-4095
      
      // Decode packet ID from bytes 16-19
      const packetID = (data[16] << 24) | (data[17] << 16) | (data[18] << 8) | data[19];
      
      // Update sensor display
      sensorValue.classList.add('updating');
      sensorValue.textContent = sensor0;
      setTimeout(() => sensorValue.classList.remove('updating'), 200);
      
      // Packet loss calculation
      totalPacketsReceived++;
      
      if (lastPacketID !== -1) {
        const expectedID = lastPacketID + 1;
        if (packetID !== expectedID) {
          const lost = packetID - expectedID;
          totalPacketsLost += lost;
          console.warn(`⚠️ Packet loss detected! Expected ${expectedID}, got ${packetID}. Lost: ${lost}`);
        }
      }
      
      lastPacketID = packetID;
      currentPacketID = packetID;
      
      // Update packet stats
      const totalExpected = currentPacketID + 1;
      const lossPercentage = (totalPacketsLost / totalExpected) * 100;
      
      packetCount.textContent = totalPacketsReceived;
      packetsReceived.textContent = totalPacketsReceived;
      packetsLost.textContent = totalPacketsLost;
      packetsExpected.textContent = totalExpected;
      lossPercent.textContent = lossPercentage.toFixed(2) + '%';
      
      // Color code based on loss percentage
      lossCard.classList.remove('warning', 'error');
      lossPercent.classList.remove('good', 'warning', 'bad');
      
      if (lossPercentage === 0) {
        lossPercent.classList.add('good');
      } else if (lossPercentage < 5) {
        lossPercent.classList.add('warning');
        lossCard.classList.add('warning');
      } else {
        lossPercent.classList.add('bad');
        lossCard.classList.add('error');
      }
      
      // Record data if session is active
      if (isRecording) {
        const timestamp = (Date.now() - recordingStartTime) / 1000;
        recordingData.push({ time: timestamp, value: sensor0 });
      }
    }

    function startRecording() {
      isRecording = true;
      recordingData = [];
      recordingStartTime = Date.now();
      
      startBtn.classList.add('recording');
      stopBtn.disabled = false;
      recordingIndicator.classList.add('active');
      graphContainer.classList.remove('visible');
      
      timerInterval = setInterval(updateTimer, 1000);
      
      console.log('🔴 Recording started');
    }

    function stopRecording() {
      isRecording = false;
      
      startBtn.classList.remove('recording');
      stopBtn.disabled = true;
      recordingIndicator.classList.remove('active');
      
      clearInterval(timerInterval);
      
      generateGraph();
      
      console.log('⏹ Recording stopped. Data points:', recordingData.length);
    }

    function updateTimer() {
      const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
      const minutes = Math.floor(elapsed / 60);
      const seconds = elapsed % 60;
      recTime.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    function generateGraph() {
      if (recordingData.length === 0) {
        alert('No data recorded!');
        return;
      }

      graphContainer.classList.add('visible');

      const duration = recordingData[recordingData.length - 1].time;
      const values = recordingData.map(d => d.value);
      const avgValue = Math.round(values.reduce((a, b) => a + b, 0) / values.length);
      const maxValue = Math.max(...values);

      document.getElementById('statDuration').textContent = `${Math.round(duration)}s`;
      document.getElementById('statAvg').textContent = avgValue;
      document.getElementById('statMax').textContent = maxValue;

      if (chart) chart.destroy();

      const ctx = document.getElementById('sessionChart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: recordingData.map(d => d.time.toFixed(1)),
          datasets: [{
            label: 'Sensor Value (12-bit)',
            data: recordingData.map(d => d.value),
            borderColor: '#0066CC',
            backgroundColor: 'rgba(0, 102, 204, 0.1)',
            borderWidth: 3,
            tension: 0.4,
            fill: true,
            pointRadius: 0,
            pointHoverRadius: 6,
            pointHoverBackgroundColor: '#FF6B35',
            pointHoverBorderColor: '#FFFFFF',
            pointHoverBorderWidth: 2,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#141824',
              titleColor: '#FFFFFF',
              bodyColor: '#8A8FA8',
              borderColor: '#0066CC',
              borderWidth: 2,
              padding: 12,
              displayColors: false,
            }
          },
          scales: {
            x: {
              title: {
                display: true,
                text: 'Time (seconds)',
                color: '#8A8FA8',
                font: { size: 11, weight: 'bold' }
              },
              ticks: { color: '#8A8FA8', maxTicksLimit: 8 },
              grid: { color: 'rgba(138, 143, 168, 0.1)' }
            },
            y: {
              title: {
                display: true,
                text: 'Sensor Value (12-bit)',
                color: '#8A8FA8',
                font: { size: 11, weight: 'bold' }
              },
              min: 0,
              max: 4095,
              ticks: { color: '#8A8FA8' },
              grid: { color: 'rgba(138, 143, 168, 0.1)' }
            }
          }
        }
      });
    }

    if (!navigator.bluetooth) {
      alert('Web Bluetooth not supported. Use Chrome on Android.');
      connectBtn.disabled = true;
      connectBtn.textContent = 'NOT SUPPORTED';
    }
  </script>
</body>
</html>
